seed: 42

data:
  root: ./data/NUDT-SIRST
  resize: [256, 256]
  augment: true
  num_workers: 4

model:
  in_channels: 1
  num_classes: 1
  base_dim: 32
  depths: [1, 1, 2, 2]
  norm: batch
  use_aux_heads: true

  mamba:
    variant: parallel
    scan_backend: auto
    parallel_real_variant: ss2d
    parallel_fusion: concat
    expansion: 2.0
    conv_kernel: 3
    dropout: 0.0
    decay_init: 0.75
    d_state: 16
    dt_rank: auto
    dt_min: 0.001
    dt_max: 0.1
    dt_init: random
    dt_scale: 1.0
    dt_init_floor: 0.0001
    bias: false
    conv_bias: true

  mirfd:
    residual_type: mamba_residual
    use_gate: true
    use_learnable_gamma: false
    fusion: concat
    hfe_kernels: [3, 5]
    pre_norm: layer

  decoder:
    use_high_residual_skip: true

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  aux_weight: 0.2
  spectral_low_weight: 0.01
  spectral_high_weight: 0.01
  spectral_low_radius_ratio: 0.25

train:
  optimizer: AdamW
  lr: 0.0003
  weight_decay: 0.01
  epochs: 300
  batch_size: 8
  amp: true
  scheduler: cosine
